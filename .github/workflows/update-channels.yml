name: 🔄 Actualizar Canales M3U

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

# PERMISOS EXPLÍCITOS - ESTO ARREGLA EL ERROR
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias
        run: pip install requests
      
      - name: 🚀 Ejecutar pipeline
        run: python scripts/run_all.py
      
      - name: 📊 Resultados
        run: |
          echo "=== TV ==="
          python -c "import json; d=json.load(open('data/tv_channels.json')); print(f'Online: {len(d)}')" || echo "0"
          echo "=== Radio ==="
          python -c "import json; d=json.load(open('data/radio_channels.json')); print(f'Online: {len(d)}')" || echo "0"
      
      - name: 💾 Commit y push
        run: |
          git config user.name "🤖 Bot Canales"
          git config user.email "bot@github.com"
          git add output/ data/ README.md
          
          if git diff --staged --quiet; then
            echo "⏭️ Sin cambios"
          else
            git commit -m "🔄 Auto-update: $(date '+%H:%M') | $(python -c 'import json; t=len(json.load(open(\"data/tv_channels.json\"))); r=len(json.load(open(\"data/radio_channels.json\"))); print(f\"{t}TV+{r}Radio\")')"
            git push
          fi
