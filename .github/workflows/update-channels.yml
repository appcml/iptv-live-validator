name: 🔄 Bot IPTV - Buscar, Validar, Reparar

on:
  schedule:
    - cron: '0 * * * *'    # Cada 1 hora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias
        run: pip install requests
      
      - name: 🤖 Ejecutar Bot completo
        run: python scripts/run_all.py
      
      - name: 📊 Estadísticas
        run: |
          echo "=== RESULTADOS ==="
          python -c "import json; t=len(json.load(open('data/tv_channels.json'))); r=len(json.load(open('data/radio_channels.json'))); print(f'✅ ONLINE: {t} TV + {r} Radio = {t+r} total')"
          python -c "import json; d=json.load(open('data/scrape_log.json')); print(f'🔍 Último scrapeo: {d.get(\"scraped_at\",\"N/A\")}')"

      - name: 💾 Commit y push
        run: |
          git config user.name "🤖 Bot IPTV"
          git config user.email "bot@github.com"
          git add .
          
          if git diff --staged --quiet; then
            echo "⏭️ Sin cambios"
          else
            git commit -m "🤖 Auto: $(date '+%H:%M') | $(python -c 'import json; t=len(json.load(open(\"data/tv_channels.json\"))); r=len(json.load(open(\"data/radio_channels.json\"))); print(f\"{t}TV+{r}Radio\")')"
            git push
          fi
