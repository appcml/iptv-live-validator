name: 🔄 Actualizar Canales M3U

on:
  schedule:
    # Cada 3 horas
    - cron: '0 */3 * * *'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: 🚀 Ejecutar pipeline
        run: |
          python scripts/run_all.py
      
      - name: 📊 Mostrar resultados
        run: |
          echo "=== TV Channels ==="
          cat data/tv_channels.json | python -m json.tool | head -30
          echo ""
          echo "=== Radio Channels ==="
          cat data/radio_channels.json | python -m json.tool | head -30
      
      - name: 💾 Commit y push
        run: |
          git config user.name "🤖 Bot Canales"
          git config user.email "bot@github.com"
          
          git add output/
          git add data/
          git add README.md
          
          # Solo commit si hay cambios
          if git diff --staged --quiet; then
            echo "⏭️ Sin cambios, no se hace commit"
          else
            git commit -m "🔄 Auto-update: $(date '+%Y-%m-%d %H:%M') | Streams verificados"
            git push
            echo "✅ Cambios subidos a GitHub"
          fi
