name: 📥 Importar desde CIC-TV y Validar

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias
        run: pip install requests
      
      - name: 🧹 Limpiar datos anteriores
        run: |
          echo '{}' > data/tv_channels_raw.json
          echo '{}' > data/radio_channels_raw.json
          echo "✅ Datos limpiados"
      
      - name: 📥 Importar desde CIC-TV
        run: python scripts/import_from_cic_tv.py
      
      - name: 🔍 Validar streams (sin límite estricto)
        run: |
          # Modificar temporalmente el límite para validar más canales
          sed -i 's/MAX_CHANNELS = 150/MAX_CHANNELS = 500/' scripts/validator.py
          python scripts/validator.py
      
      - name: 📄 Generar archivos
        run: python scripts/generator.py
      
      - name: 💾 Commit y push
        run: |
          git config user.name "🤖 Bot Canales"
          git config user.email "bot@github.com"
          git add output/ data/ README.md
          
          if git diff --staged --quiet; then
            echo "⏭️ Sin cambios"
          else
            git commit -m "📥 Import CIC-TV + Validacion: $(date '+%H:%M') | $(python -c 'import json; t=len(json.load(open(\"data/tv_channels.json\"))); r=len(json.load(open(\"data/radio_channels.json\"))); print(f\"{t}TV+{r}Radio\")')"
            git push
          fi
