name: 📥 Carga inicial desde CIC-TV

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias
        run: pip install requests
      
      - name: 📥 Importar desde CIC-TV
        run: python scripts/import_from_cic_tv.py
      
      - name: 💾 Commit
        run: |
          git config user.name "🤖 Bot IPTV"
          git config user.email "bot@github.com"
          git add data/
          
          if git diff --staged --quiet; then
            echo "⏭️ Sin cambios"
          else
            git commit -m "📥 Carga inicial CIC-TV: $(date '+%H:%M')"
            git push
          fi
