name: 📥 Importar desde CIC-TV y Validar

on:
  workflow_dispatch:  # Solo manual, nunca automatico

jobs:
  import-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias
        run: pip install requests
      
      - name: 📥 Importar desde CIC-TV
        run: python scripts/import_from_cic_tv.py
      
      - name: 🔍 Validar streams
        run: python scripts/validator.py
      
      - name: 📄 Generar archivos
        run: python scripts/generator.py
      
      - name: 💾 Commit y push
        run: |
          git config user.name "🤖 Bot Canales"
          git config user.email "bot@github.com"
          git add output/ data/ README.md
          
          if git diff --staged --quiet; then
            echo "⏭️ Sin cambios"
          else
            git commit -m "📥 Import desde CIC-TV + Validacion: $(date '+%H:%M')"
            git push
          fi
